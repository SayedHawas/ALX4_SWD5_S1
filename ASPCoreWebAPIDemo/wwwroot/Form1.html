    <form>

        Age : <input type="number" name="txtAge" id="txt2"  onfocus="validationText('txt1')" >

    <script>
        function validationText(target){
             var t = document.getElementById(target);
             if(t.value==0 || t.value == null)
             {
                 alert('Must Enter Name');
                 t.focus();
                 return false;
             }
             else{
                return true;
             }


        }
